<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <link rel="icon" type="image/jpeg" href="/favicon.png">
    <title>Facility.IA - Workstation</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style-master.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">

    <script src="config.js"></script>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body.chat-mode { font-family: 'Inter', sans-serif; }

        /* --- Scrollbar Customizada --- */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(16,185,129,0.4); }

        /* --- Styles Específicos para as Novas Funcionalidades --- */

        /* Code Blocks */
        pre {
            background: #282c34;
            border-radius: 8px;
            margin: 10px 0;
            position: relative;
            overflow: hidden;
        }

        code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1c1e24;
            padding: 5px 10px;
            font-size: 0.75rem;
            color: #abb2bf;
            border-bottom: 1px solid #3e4451;
        }

        .copy-code-btn {
            background: none;
            border: none;
            color: #abb2bf;
            cursor: pointer;
            transition: color 0.2s;
        }

        .copy-code-btn:hover {
            color: var(--primary);
        }


        /* Edit User Message */
        .edit-msg-btn {
            margin-left: 10px;
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
            color: #888;
            font-size: 0.8rem;
        }

        .user-message:hover .edit-msg-btn {
            opacity: 1;
        }

        .edit-msg-btn:hover {
            color: var(--primary);
        }

        /* Rich Attachment Preview */
        .rich-preview {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 5px;
            border: 1px solid var(--primary);
        }

        .preview-thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            font-size: 0.8rem;
            color: #fff;
        }

        .file-meta {
            font-size: 0.7rem;
            color: #aaa;
        }

        /* History Group Headers */
        .history-date-header {
            font-size: 0.75rem;
            color: #666;
            padding: 10px 15px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* Animação suave do fundo do cabeçalho */
        @keyframes smoothGradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* .chat-header-bar movido e ajustado acima para evitar duplicação */

        /* Status Pulsante */
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        .header-agent-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(0, 0, 0, 0.5));
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.2rem;
            box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.1);
        }

        /* Tipografia do Nome do Agente no Cabeçalho */
        #headerName {
            font-size: 1.2rem;
            font-weight: 700 !important;
            background: linear-gradient(90deg, #ffffff, #a7f3d0);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .export-btn {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #efefef !important;
            padding: 8px 16px !important;
            border-radius: 12px !important;
            cursor: pointer;
            font-size: 0.8rem !important;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            letter-spacing: 0.03em;
        }

        .export-btn:hover {
            background: rgba(16, 185, 129, 0.1) !important;
            border-color: rgba(16, 185, 129, 0.4) !important;
            color: var(--primary) !important;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.15);
        }

        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0);
            }
        }

        .messages-area {
            padding: 20px 10vw 120px 10vw;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .message-row {
            display: flex;
            width: 100%;
            gap: 14px;
            animation: msgSlideIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        @keyframes msgSlideIn {
            from { opacity: 0; transform: translateY(14px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* MENSAGEM DA IA */
        .ai-message { justify-content: flex-start; }
        .ai-message .message-content-wrapper { max-width: 82%; }
        .ai-message .message-bubble {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 4px 4px 4px 2px;
            color: #dde3ec;
            font-size: 1rem;
            line-height: 1.8;
            letter-spacing: 0.01em;
        }

        .ai-avatar {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, #0d3d2a 0%, #0a2e20 100%);
            border: 1px solid rgba(16,185,129,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 4px;
            position: relative;
            box-shadow: 0 0 12px rgba(16,185,129,0.15);
        }

        /* Animação Circular de Pensamento no Ícone do Chat */
        .ai-avatar.thinking::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            padding: 2px;
            background: conic-gradient(from 0deg, var(--primary), transparent, var(--primary));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: rotate-avatar 1.5s linear infinite;
        }

        @keyframes rotate-avatar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* MENSAGEM DO USUÁRIO */
        .user-message { justify-content: flex-end; }
        .user-message .message-content-wrapper {
            max-width: 68%;
            align-items: flex-end;
        }
        .user-message .message-bubble {
            background: linear-gradient(135deg, #1a2e25 0%, #1e3329 100%);
            border: 1px solid rgba(16,185,129,0.2);
            color: #e2f5ee;
            padding: 13px 18px;
            border-radius: 18px 18px 4px 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
        }


        .message-bubble pre {
            max-width: 100%;
            overflow-x: auto;
            white-space: pre;
            border-radius: 6px;
        }

        .message-bubble table {
            display: block;
            overflow-x: auto;
            max-width: 100%;
        }

        .message-bubble h1,
        .message-bubble h2,
        .message-bubble h3 {
            margin-top: 10px;
            margin-bottom: 5px;
            color: #fff;
        }

        .message-bubble ul,
        .message-bubble ol {
            margin-left: 20px;
            margin-bottom: 10px;
        }

        .message-bubble blockquote {
            border-left: 3px solid var(--primary);
            padding-left: 10px;
            color: #aaa;
            font-style: italic;
        }

        .message-bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 0.9rem;
        }

        .message-bubble th,
        .message-bubble td {
            border: 1px solid #444;
            padding: 6px;
            text-align: left;
        }

        .message-bubble th {
            background: #333;
        }

        .message-bubble p {
            margin-bottom: 10px;
        }

        /* --- ESTILOS DO MODAL (ATUALIZADO PARA ABAS) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999999 !important; /* Valor extremo para garantir sobreposição total */
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .modal-content {
            background: #161b22;
            width: 90%;
            max-width: 900px;
            height: 85vh;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* --- Tabs Styles --- */
        .modal-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(0, 0, 0, 0.2);
        }

        .modal-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px;
            color: #888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .modal-tab:hover {
            background: rgba(255, 255, 255, 0.02);
            color: #ccc;
        }

        .modal-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            background: rgba(16, 185, 129, 0.05);
        }

        /* --- Accordion Styles (System Prompts) --- */
        .accordion-item {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
        }

        .accordion-header {
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            font-weight: bold;
            color: #eee;
            transition: background 0.2s;
        }

        .accordion-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .accordion-body {
            display: none;
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .accordion-item.active .accordion-body {
            display: grid;
        }

        .accordion-item.active .fa-chevron-down {
            transform: rotate(180deg);
        }

        /* --- Cards Styles --- */
        .prompt-list-item,
        .system-prompt-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .prompt-list-item:hover,
        .system-prompt-card:hover {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* --- Tooltip Customizado para System Prompts --- */
        .sp-has-tooltip {
            position: relative;
        }

        .sp-tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            border: 1px solid var(--primary);
            color: #ccc;
            font-size: 0.78rem;
            line-height: 1.4;
            padding: 8px 12px;
            border-radius: 8px;
            width: 220px;
            text-align: left;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.2);
        }

        .sp-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: var(--primary);
        }

        .sp-has-tooltip:hover .sp-tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* INPUT WRAPPER */
        .input-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 16px 20px 24px;
            transition: bottom 0.7s cubic-bezier(0.25,1,0.5,1), transform 0.7s cubic-bezier(0.25,1,0.5,1), background 0.7s ease;
            z-index: 2000;
            display: flex;
            justify-content: center;
            background: linear-gradient(to top, var(--bg-deep) 40%, transparent);
        }

        .floating-panel, .floating-menu { z-index: 2100; }

        .chat-interface.is-initial-state .input-wrapper {
            bottom: 30%;
            transform: translateY(50%);
            background: transparent !important;
        }

        .input-box-styled {
            width: 100%;
            max-width: 780px;
            background: rgba(22,27,36,0.95);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 12px 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 0 rgba(16,185,129,0);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            pointer-events: auto;
            backdrop-filter: blur(12px);
        }

        .input-box-styled:focus-within {
            border-color: rgba(16,185,129,0.45);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 3px rgba(16,185,129,0.08);
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            resize: none;
            max-height: 200px;
            padding: 8px 5px;
            font-size: 1rem;
            line-height: 1.5;
        }

        #userInput:focus {
            outline: none;
        }

        #userInput::placeholder {
            color: #6b7280;
        }

        .action-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .action-icon:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        #sendBtn {
            background: var(--primary) !important;
            border-radius: 12px !important;
            width: 40px !important;
            height: 40px !important;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0;
            color: #000 !important;
            font-size: 0.95rem;
            box-shadow: 0 4px 14px rgba(16,185,129,0.4);
            transition: all 0.2s ease;
            border: none;
        }
        #sendBtn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(16,185,129,0.55); }
        #sendBtn.stop-btn { background: #ff4444 !important; box-shadow: 0 4px 14px rgba(255,68,68,0.4); }


        .prompt-list-item strong,
        .sp-title {
            display: block;
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .prompt-list-item p {
            color: #888;
            font-size: 0.8rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sp-prof {
            font-size: 0.7rem;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        /* --- Badges --- */
        .module-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.25);
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 0.68rem;
            color: #6ee7b7;
            white-space: nowrap;
            animation: badge-pop 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;
            transition: all 0.2s ease;
        }
        .module-badge:hover { background: rgba(16,185,129,0.18); transform: translateY(-1px); }
        @keyframes badge-pop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
        .active-modules-container { display:flex; flex-wrap:wrap; gap:6px; margin-top:5px; max-width:100%; }

        /* --- Action Row (Copiar / Regerar) --- */
        .action-row {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .message-row:hover .action-row { opacity: 1; }
        .icon-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #888;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: rgba(16,185,129,0.12); color: var(--primary); border-color: rgba(16,185,129,0.3); }

        /* --- Toggle Histórico Estático (Global) --- */
        .global-toggle {
            position: absolute;
            top: 10px;
            left: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: #ccc;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            cursor: pointer;
        }

        .global-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: scale(1.1);
        }

        .global-toggle:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.15);
        }

        .global-toggle i {
            font-size: 1.3rem;
        }

        .chat-header-bar {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 60px;
            height: auto;
            background: rgba(8,10,14,0.75) !important;
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 10px 20px 10px 60px;
            z-index: 1500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 0 rgba(255,255,255,0.04), 0 8px 32px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        .chat-header-bar .header-top {
            width: 100%;
            height: 100%;
            /* Ocupar toda a altura para centralização perfeita */
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: padding 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Quando o histórico está ABERTO, empurramos apenas o CONTEÚDO do header */
        .chat-layout:not(.history-collapsed) .chat-header-bar .header-top {
            padding-left: 230px;
            /* Sidebar (280) - recuo inicial (60) + ajuste visual */
        }

        /* Ajustes de Layout para o Estado Colapsado */
        .chat-layout {
            display: flex;
            flex-direction: column; /* Organização vertical: Header no topo, resto abaixo */
            width: 100vw;
            height: 100vh;
            padding-top: 0; /* Removido pois o header agora é sticky e ocupa espaço no fluxo */
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chat-main-container {
            display: flex;
            flex: 1;
            width: 100%;
            height: 0; /* Hack para flex-grow + overflow funcionar corretamente */
            min-height: 0;
        }

    <script>
        // 1. Verificação de Segurança
        (function () {
            const token = localStorage.getItem('token');
            if (!token) window.location.href = "login.html";
        })();

        // 2. Configurações Markdown e Highlight
        marked.setOptions({
            highlight: function (code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-',
            breaks: true
        });

        // 3. Base de Conhecimento Estática
        const knowledgeBase = {
            juridico: [{ label: "REVISAR CONTRATO", desc: "Analisar cláusulas abusivas." }, { label: "REDIGIR PETIÇÃO", desc: "Estrutura formal jurídica." }],
            saude: [{ label: "INTERAÇÃO MEDICAMENTOSA", desc: "Verificar conflitos." }, { label: "EXPLICAÇÃO DE EXAME", desc: "Traduzir laudos técnicos." }],
            tech: [{ label: "DEBUG CODE", desc: "Encontrar erros no código." }, { label: "DOCUMENTAR API", desc: "Gerar Swagger/OpenAPI." }],
            geral: [{ label: "RESUMIR TEXTO", desc: "Criar síntese executiva." }, { label: "MELHORAR ESCRITA", desc: "Corrigir gramática e tom." }]
        };

        // Variáveis de Estado
        let activeContexts = new Set();
        let currentAgentIcon = "";
        let currentAgentName = "";
        let currentAgentArea = "geral";
        let currentFile = null;
        let currentSessionId = null;
        let isGenerating = false;
        let currentAbortController = null;
        let recognition = null;
        let cachedSystemPrompts = null;
        let cachedUserPrompts = null;


        // Elementos DOM
        const userInput = document.getElementById('userInput');
        const messagesArea = document.getElementById('messagesArea');
        const sendBtn = document.getElementById('sendBtn');

        // Inicialização
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('realFileInput').addEventListener('change', handleFileSelected);

            // Setup Speech API
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.lang = 'pt-BR';
                recognition.onresult = (event) => {
                    const text = event.results[0][0].transcript;
                    userInput.value += (userInput.value ? ' ' : '') + text;
                    userInput.focus();

                    // Auto-resize
                    userInput.style.height = 'auto';
                    userInput.style.height = userInput.scrollHeight + 'px';
                    userInput.style.overflowY = userInput.scrollHeight >= 300 ? 'auto' : 'hidden';

                    document.getElementById('micBtn').style.color = '';
                };
                recognition.onerror = () => { document.getElementById('micBtn').style.color = 'red'; };
                recognition.onend = () => { document.getElementById('micBtn').style.color = ''; };
            }

            // Setup Input
            userInput.addEventListener('input', function () {
                // Auto-resize logic
                this.style.height = 'auto';
                const newHeight = this.scrollHeight;
                this.style.height = newHeight + 'px';

                // Toggle scrollbar manually for better UX if needed
                if (newHeight >= 300) {
                    this.style.overflowY = 'auto';
                } else {
                    this.style.overflowY = 'hidden';
                }
            });

            // Params e Setup
            const params = new URLSearchParams(window.location.search);
            const agentName = params.get('name') || params.get('agent') || 'Assistente';
            const agentIcon = params.get('icon') || 'fa-robot';
            const agentArea = params.get('area') || 'geral';

            setupChat(agentName, agentIcon, agentArea);

            if (window.innerWidth <= 768) {
                const mobileMenu = document.querySelector('.mobile-only');
                if (mobileMenu) mobileMenu.style.display = 'block';
            }

            // --- AUTO-PREENCHIMENTO DE PROMPT ---
            const promptPendente = localStorage.getItem('prompt_pendente');
            if (promptPendente) {
                const campoInput = document.getElementById('userInput');
                if (campoInput) {
                    campoInput.value = promptPendente;
                    campoInput.dispatchEvent(new Event('input'));
                    campoInput.focus();
                }
                localStorage.removeItem('prompt_pendente');
            }

            // Restaura estado do histórico colapsado
            const isCollapsed = localStorage.getItem('chat_history_collapsed') === 'true';
            if (isCollapsed) {
                const layout = document.querySelector('.chat-layout');
                if (layout) layout.classList.add('history-collapsed');
            }
        });

        // --- SETUP DO CHAT ---
        function setupChat(name, icon, area) {
            if (name.includes('-')) name = name.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

            const params = new URLSearchParams(window.location.search);
            currentSessionId = params.get('sessionId') || Date.now().toString();

            currentAgentName = name;
            currentAgentIcon = icon.replace('fa-', '');
            currentAgentArea = area;

            document.getElementById('headerName').innerText = name;
            document.getElementById('headerIcon').innerHTML = `<i class="fas fa-${currentAgentIcon}"></i>`;

            activeContexts.clear();
            updateActiveBadges();
            messagesArea.innerHTML = "";
            loadSwitches(area);

            const chatInterface = document.getElementById('chatInterface');

            if (params.get('sessionId')) {
                chatInterface.classList.remove('is-initial-state');
                loadSessionMessages(currentSessionId);
            } else {
                // É uma nova conversa, adicionamos a classe para centrar o input
                chatInterface.classList.add('is-initial-state');

                // Nova Tela Inicial Elegante
                const emptyStateHTML = `
                    <div id="emptyState" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding: 20px; opacity:0; animation: fadeIn 0.8s 0.2s forwards;">

                        <div style="position:relative; margin-bottom:24px;">
                            <div style="width:88px;height:88px;border-radius:22px;background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(5,150,105,0.05));display:flex;align-items:center;justify-content:center;font-size:2.6rem;color:var(--primary);box-shadow:0 0 40px rgba(16,185,129,0.2),inset 0 0 20px rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.2);">
                                <i class="fas fa-${currentAgentIcon}"></i>
                            </div>
                            <div style="position:absolute;bottom:-4px;right:-4px;width:22px;height:22px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-bolt" style="font-size:0.6rem;color:#000;"></i>
                            </div>
                        </div>

                        <h2 style="color:white;font-size:1.7rem;font-weight:600;margin:0 0 6px;letter-spacing:-0.03em;">Como posso ajudar?</h2>
                        <p style="color:#6b7280;font-size:0.95rem;margin:0 0 36px;">${currentAgentName} &mdash; pronto para trabalhar</p>

                        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(min(200px,100%),1fr));gap:10px;width:100%;max-width:680px;">
                            ${[
                                { icon:'fa-compress-alt', text:'Resumir Texto', prompt:'Me ajude a resumir um texto.' },
                                { icon:'fa-check-double', text:'Revisar Documento', prompt:'Pode revisar um documento para mim?' },
                                { icon:'fa-lightbulb',    text:'Ideia Criativa',   prompt:'Gere uma ideia criativa para...' },
                                { icon:'fa-chart-line',  text:'Análise de Dados', prompt:'Ajude-me com uma análise de dados.' },
                                { icon:'fa-book-open',   text:'Dicas de Estudo',  prompt:'Quais são as melhores dicas de estudo?' },
                                { icon:'fa-language',    text:'Traduzir Texto',   prompt:'Pode traduzir o seguinte texto?' },
                            ].map(s => `
                                <button onclick="preencherInput('${s.prompt}')" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);padding:14px 16px;border-radius:14px;color:#9ca3af;cursor:pointer;transition:all 0.2s;font-size:0.87rem;text-align:left;display:flex;align-items:center;gap:10px;">
                                    <span style="width:30px;height:30px;background:rgba(16,185,129,0.08);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                        <i class="fas ${s.icon}" style="color:var(--primary);font-size:0.8rem;"></i>
                                    </span>
                                    ${s.text}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
                messagesArea.innerHTML = emptyStateHTML;
            }

            loadHistoryFromAPI();
        }

        // --- PREENCHER INPUT (botões do empty state) ---
        function preencherInput(texto) {
            userInput.value = texto;
            userInput.dispatchEvent(new Event('input'));
            userInput.focus();
        }

        // --- INTERAÇÃO UX ---
        function copiarTexto(btn, texto) {
            navigator.clipboard.writeText(texto).then(() => {
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copiado';
                btn.style.color = 'var(--neon-green)';
                setTimeout(() => { btn.innerHTML = originalHTML; btn.style.color = ''; }, 2000);
            });
        }

        function toggleRecording() {
            if (!recognition) return alert("Seu navegador não suporta reconhecimento de voz.");
            recognition.start();
            document.getElementById('micBtn').style.color = 'var(--neon-green)';
        }


        function editUserMessage(text) {
            userInput.value = text;
            userInput.focus();

            // Refaz a altura
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        }

        // --- ENVIO DE MENSAGEM COM STOP REAL ---
        async function handleSendMessage() {
            if (isGenerating) {
                // PARAR a geração
                if (currentAbortController) {
                    currentAbortController.abort();
                    currentAbortController = null;
                }
                isGenerating = false;

                // Remove thinking do avatar
                const avatarThinking = messagesArea.querySelector('.ai-avatar.thinking');
                if (avatarThinking) avatarThinking.classList.remove('thinking');

                // Marca mensagem como interrompida
                const loadingBubble = messagesArea.querySelector('.ai-message:last-child .message-bubble');
                if (loadingBubble && loadingBubble.classList.contains('typing-cursor')) {
                    loadingBubble.classList.remove('typing-cursor');
                    loadingBubble.innerHTML += "\u003cbr\u003e\u003cem style='color:#888; font-size:0.85rem;'\u003e[Interrompido pelo usuário]\u003c/em\u003e";
                }

                setSendButtonState('send');
                return;
            }

            const text = userInput.value.trim();
            if (!text && !currentFile) return;

            const chatInterface = document.getElementById('chatInterface');
            if (chatInterface.classList.contains('is-initial-state')) {
                chatInterface.classList.remove('is-initial-state');
            }

            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();

            if (text) addMessage("user", text);

            if (currentFile) {
                const fileHTML = `<div class="rich-preview" style="background: rgba(255,255,255,0.1); display:inline-flex;">
                <i class="fas fa-file" style="font-size:1.5rem; color:var(--primary)"></i>
                <div class="file-info">
                    <strong>${currentFile.name}</strong>
                    <span class="file-meta">${(currentFile.size / 1024).toFixed(1)} KB</span>
                </div>
            </div>`;
                addMessage("user", fileHTML, null, false, true);
            }

            const aiDiv = addMessage("ai", "", currentAgentIcon, true);
            userInput.value = "";
            userInput.style.height = '38px';
            userInput.style.overflowY = 'hidden';
            userInput.blur(); // Remove foco para o teclado mobile fechar

            const fileToSend = currentFile;
            clearAttachments();

            isGenerating = true;
            setSendButtonState('stop');

            currentAbortController = new AbortController();
            const signal = currentAbortController.signal;

            try {
                const token = localStorage.getItem('token');

                // --- NOVA LÓGICA DE CONTEXTOS OCULTOS ---
                let contextosSecretos = activeContexts.size > 0
                    ? Array.from(activeContexts).map(c => `[Contexto Ativo - ${c.label}]:\n${c.content}`).join("\n\n")
                    : "";

                let responseText = "";

                await new Promise(r => setTimeout(r, 500));

                if (typeof CONFIG !== 'undefined' && CONFIG.API_URL) {
                    try {
                        const formData = new FormData();
                        formData.append('message', text); // Envia apenas a mensagem visível ao utilizador
                        formData.append('agentId', currentAgentName);
                        formData.append('sessionId', currentSessionId);
                        formData.append('isHidden', 'false');

                        if (contextosSecretos) {
                            formData.append('activeContexts', contextosSecretos);
                        }
                        if (fileToSend) formData.append('file', fileToSend);

                        const res = await fetch(`${CONFIG.API_URL}/api/chat/enviar`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}` },
                            body: formData,
                            signal: signal
                        });

                        if (res.ok) {
                            const data = await res.json();
                            responseText = data.reply;
                        } else {
                            if (res.status === 499) throw new Error("AbortError");
                            throw new Error("Erro na API");
                        }

                    } catch (e) {
                        if (e.name === 'AbortError' || e.message === 'AbortError') {
                            throw new Error("Geração cancelada.");
                        }
                        console.log("API offline ou erro, usando simulação.", e);
                        responseText = simulateAIResponse(text, currentAgentName);
                    }
                } else {
                    responseText = simulateAIResponse(text, currentAgentName);
                }

                const bubble = aiDiv.querySelector('.message-bubble');
                bubble.classList.remove('typing-cursor');
                bubble.innerHTML = "";

                let i = 0;
                const speed = 10;
                let currentMarkdown = "";

                const typeLoop = () => {
                    if (!isGenerating) return;

                    if (i < responseText.length) {
                        currentMarkdown += responseText.charAt(i);
                        bubble.innerHTML = marked.parse(currentMarkdown);
                        i++;
                        smartScroll();
                        setTimeout(typeLoop, speed);
                    } else {
                        finalizeMessage(aiDiv, currentMarkdown);
                    }
                };
                typeLoop();

            } catch (e) {
                if (e.message === "Geração cancelada." || e.name === 'AbortError') {
                    isGenerating = false;
                    setSendButtonState('send');
                    return;
                }

                const bubble = aiDiv.querySelector('.message-bubble');
                bubble.innerText = "Erro: " + e.message;
                bubble.style.color = "#ff6b6b";
                isGenerating = false;
                setSendButtonState('send');
            } finally {
                currentAbortController = null;
            }
        }

        function finalizeMessage(aiDiv, text) {
            const bubble = aiDiv.querySelector('.message-bubble');
            const avatar = aiDiv.querySelector('.ai-avatar');
            
            if (avatar) avatar.classList.remove('thinking');
            bubble.innerHTML = marked.parse(text);

            bubble.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
                const pre = block.parentElement;
                const lang = block.className.replace('hljs language-', '') || 'Code';
                if (!pre.querySelector('.code-header')) {
                    const header = document.createElement('div');
                    header.className = 'code-header';
                    header.innerHTML = `<span>${lang}</span> <button class="copy-code-btn" onclick="copiarTexto(this, this.parentElement.nextElementSibling.innerText)"><i class="far fa-copy"></i> Copiar Código</button>`;
                    pre.insertBefore(header, block);
                }
            });

            isGenerating = false;
            setSendButtonState('send');
            smartScroll();

            const contentWrapper = aiDiv.querySelector('.message-content-wrapper');
            if (!contentWrapper.querySelector('.action-row')) {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'action-row';
                actionsDiv.innerHTML = `
                <button class="icon-btn" onclick="copiarTexto(this, decodeURIComponent('${encodeURIComponent(text)}'))" title="Copiar Resposta"><i class="far fa-copy"></i></button>
                <button class="icon-btn" title="Regerar resposta" onclick="regerarResposta(this)"><i class="fas fa-redo"></i></button>
            `;
                contentWrapper.appendChild(actionsDiv);
            }
        }

        // Regera a última mensagem do usuário
        function regerarResposta(btn) {
            // Pega a mensagem do usuário anterior a este bloco AI
            const allRows = Array.from(messagesArea.querySelectorAll('.message-row'));
            const aiRow = btn.closest('.message-row');
            const aiIndex = allRows.indexOf(aiRow);
            let lastUserText = '';
            for (let i = aiIndex - 1; i >= 0; i--) {
                if (allRows[i].classList.contains('user-message')) {
                    lastUserText = allRows[i].querySelector('.message-bubble').innerText;
                    break;
                }
            }
            if (!lastUserText) return;
            userInput.value = lastUserText;
            userInput.dispatchEvent(new Event('input'));
            handleSendMessage();
        }

        function setSendButtonState(state) {
            if (state === 'stop') {
                sendBtn.innerHTML = '<i class="fas fa-stop"></i>';
                sendBtn.classList.add('stop-btn');
            } else {
                sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                sendBtn.classList.remove('stop-btn');
            }
        }

        function smartScroll() {
            const threshold = 100;
            const position = messagesArea.scrollTop + messagesArea.offsetHeight;
            const height = messagesArea.scrollHeight;

            if (height - position < threshold || isGenerating) {
                messagesArea.scrollTop = height;
            }
        }

        function simulateAIResponse(input, role) {
            const lower = input.toLowerCase();
            if (lower.includes("/codigo") || lower.includes("html")) return "Aqui está o exemplo solicitado:\n\n```html\n<div class='container'>\n  <h1>Exemplo</h1>\n  <p>Teste de código.</p>\n</div>\n```";

            return `Compreendi sua solicitação sobre **${input.substring(0, 20)}...**. \n\nComo ${role}, aqui está minha análise:\n\n1. **Contexto**: Identifiquei a necessidade técnica.\n2. **Solução**: Recomendo seguir os padrões de desenvolvimento.\n\nSe precisar de mais detalhes ou código específico, utilize os comandos como \`/codigo\`.`;
        }

        function addMessage(sender, text, icon, typing = false, isHTML = false) {
            const d = document.createElement('div');
            const isAI = sender === 'ai';
            d.className = `message-row ${isAI ? 'ai-message' : 'user-message'}`;

            const avatarHTML = isAI ? `<div class="ai-avatar ${typing ? 'thinking' : ''}"><i class="fas fa-${icon || 'robot'}"></i></div>` : '';
            let content = typing ? '<i class="fas fa-circle-notch fa-spin"></i> Processando...' : (isHTML ? text : text.replace(/\n/g, '<br>'));

            const editBtn = (!isAI && !typing) ? `<i class="fas fa-pencil-alt edit-msg-btn" onclick="editUserMessage('${text.replace(/'/g, "\\'")}')" title="Editar e reenviar"></i>` : '';

            d.innerHTML = `
            ${avatarHTML}
            <div class="message-content-wrapper">
                <div class="message-bubble ${typing ? 'typing-cursor' : ''}">${content}</div>
                ${!isAI ? editBtn : ''}
            </div>
        `;

            messagesArea.appendChild(d);
            smartScroll();
            return d;
        }

        function triggerFileUpload(accept) { toggleMenu('attachMenu'); const i = document.getElementById('realFileInput'); i.accept = accept; i.click(); }

        function handleFileSelected(e) {
            const f = e.target.files[0]; if (!f) return;

            const allowed = ['.pdf', '.txt', '.docx', '.jpg', '.jpeg', '.png', '.webp'];
            const fileExt = f.name.substring(f.name.lastIndexOf('.')).toLowerCase();
            if (!allowed.includes(fileExt)) {
                if (typeof Swal !== 'undefined') Swal.fire('Aviso', 'Formato não suportado. Envie arquivos PDF, TXT, DOCX ou Imagens.', 'warning');
                else alert('Formato não suportado. Envie arquivos PDF, TXT, DOCX ou Imagens.');
                e.target.value = '';
                return;
            }

            currentFile = f;

            let previewHTML = `<div class="attachment-chip"><i class="fas fa-file"></i> ${f.name} <i class="fas fa-times" onclick="clearAttachments()"></i></div>`;

            if (f.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const imgThumb = `<div class="attachment-chip" style="padding:0; overflow:hidden;"><img src="${e.target.result}" style="height:30px; border-radius:15px; margin-right:5px;"> ${f.name} <i class="fas fa-times" onclick="clearAttachments()" style="margin-left:5px; margin-right:10px;"></i></div>`;
                    document.getElementById('attachmentsPreview').innerHTML = imgThumb;
                };
                reader.readAsDataURL(f);
            } else {
                document.getElementById('attachmentsPreview').innerHTML = previewHTML;
            }
        }

        function clearAttachments() { currentFile = null; document.getElementById('realFileInput').value = ""; document.getElementById('attachmentsPreview').innerHTML = ""; }

        // --- HISTÓRICO ---
        async function loadHistoryFromAPI() {
            const list = document.getElementById('historyList');
            list.innerHTML = '<div style="padding:10px; color:#666; font-size:0.8rem;">Carregando...</div>';

            try {
                const token = localStorage.getItem('token');
                const res = await fetch(`${CONFIG.API_URL}/api/chat/sessions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error("Falha ao carregar histórico");

                const history = await res.json();
                renderHistoryList(history);
            } catch (e) {
                console.error(e);
                list.innerHTML = '<div style="padding:10px; color:#666;">Histórico vazio.</div>';
            }
        }

        function renderHistoryList(history) {
            const list = document.getElementById('historyList');
            list.innerHTML = "";

            const groups = { 'Hoje': [], 'Ontem': [], 'Antigos': [] };
            const now = new Date();
            const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);

            history.forEach(h => {
                const dateStr = h.timestamp || h.Timestamp;
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return;

                if (date.toDateString() === now.toDateString()) groups['Hoje'].push(h);
                else if (date.toDateString() === yesterday.toDateString()) groups['Ontem'].push(h);
                else groups['Antigos'].push(h);
            });

            for (const [label, items] of Object.entries(groups)) {
                if (items.length > 0) {
                    list.innerHTML += `<div class="history-date-header">${label}</div>`;
                    items.forEach(h => {
                        const sessId = h.id || h.Id;
                        const title = (h.title || h.Title || "Conversa sem título").substring(0, 30);
                        const agent = h.agentId || h.AgentId || currentAgentName;

                        list.innerHTML += `
                        <div class="history-item" onclick="window.location.href='chatcomIA.html?name=${agent}&sessionId=${sessId}'">
                            <i class="fas fa-comment"></i>
                            <div style="flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">${title}</div>
                        </div>`;
                    });
                }
            }
        }

        async function loadSessionMessages(sessionId) {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch(`${CONFIG.API_URL}/api/chat/history/${sessionId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const msgs = await res.json();
                messagesArea.innerHTML = "";

                msgs.forEach(m => {
                    const senderBackend = m.sender || m.Sender;
                    const sender = (senderBackend && senderBackend.toLowerCase() === 'user') ? 'user' : 'ai';
                    const text = m.text || m.Text;
                    addMessage(sender, text, currentAgentIcon, false, false);
                });
                smartScroll();
            } catch (e) {
                addMessage('ai', 'Erro ao carregar o histórico desta conversa.', 'exclamation-triangle', false);
            }
        }

        function exportChat(format) {
            if (format === 'pdf') {
                const element = document.getElementById('messagesArea');
                const opt = { margin: 1, filename: `chat-${currentAgentName}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
                html2pdf().set(opt).from(element).save();
            } else {
                let text = "";
                const messages = document.querySelectorAll('.message-row');
                messages.forEach(row => {
                    const isUser = row.classList.contains('user-message');
                    const sender = isUser ? "USUÁRIO" : currentAgentName.toUpperCase();
                    const content = row.querySelector('.message-bubble').innerText;
                    text += `[${sender}]: ${content}\n----------------\n`;
                });
                const blob = new Blob([text], { type: "text/plain" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `chat-${currentAgentName}.txt`;
                a.click();
            }
        }

        // --- NOVA LÓGICA DE CONTEXTOS (BADGES OCULTOS) ---
        function loadSwitches(area) {
            let key = 'geral';
            if (area.includes('jur')) key = 'juridico';
            else if (area.includes('sau') || area.includes('med')) key = 'saude';
            else if (area.includes('tech') || area.includes('dev')) key = 'tech';

            const list = knowledgeBase[key] || knowledgeBase['geral'];
            const container = document.getElementById('switchesContainer');
            if (!container) return;
            container.innerHTML = "";
            list.forEach((p, i) => {
                const id = `p_${i}`;
                container.innerHTML += `<div class="prompt-switch-item"><div><div style="font-weight:bold; font-size:0.85rem; color:#eee;">${p.label}</div><div style="font-size:0.75rem; color:#888;">${p.desc}</div></div><label class="mini-switch"><input type="checkbox" onchange="toggleContext('${id}', '${p.label}', this.checked, '${p.desc}')"><span class="mini-slider"></span></label></div>`;
            });
        }

        function toggleContext(id, label, checked, desc) {
            if (checked) activeContexts.add({ id: id, label: label, content: desc });
            else activeContexts.forEach(i => { if (i.id === id) activeContexts.delete(i); });
            updateActiveBadges();
        }

        function updateActiveBadges() {
            const container = document.getElementById('activeModulesArea');
            if (!container) return;
            
            container.innerHTML = Array.from(activeContexts).map(c =>
                `<div class="module-badge" title="${c.content.substring(0, 100)}...">
                    <i class="fas fa-bolt" style="color:var(--primary); font-size:0.6rem;"></i>
                    <span>${c.label}</span>
                    <i class="fas fa-times" style="cursor:pointer; margin-left:4px; font-size:0.65rem; opacity:0.6; transition:opacity 0.2s;" 
                       onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'"
                       onclick="removerContexto('${c.id}')"></i>
                </div>`
            ).join('');
        }

        window.removerContexto = function (id) {
            activeContexts.forEach(c => { if (c.id === id) activeContexts.delete(c); });
            updateActiveBadges();
            const checkbox = document.querySelector(`input[onchange*="${id}"]`);
            if (checkbox) checkbox.checked = false;
        };

        // --- FUNÇÃO PARA ADICIONAR PROMPT PELO MODAL ---
        function selecionarPromptChat(tituloEncoded, conteudoEncoded) {
            const titulo = decodeURIComponent(tituloEncoded);
            const conteudo = decodeURIComponent(conteudoEncoded);

            const id = 'ctx_' + Date.now();
            activeContexts.add({ id: id, label: titulo, content: conteudo });
            updateActiveBadges();

            if (typeof showToast === 'function') {
                showToast(`Contexto "${titulo}" ativado com sucesso!`);
            }

            fecharModalPromptsChat();
        }

        function toggleMenu(id) {
            const allMenus = document.querySelectorAll('.floating-menu');
            const target = document.getElementById(id);
            const isOpen = target.style.display === 'block';
            // Fecha todos
            allMenus.forEach(m => m.style.display = 'none');
            // Abre o alvo se estava fechado
            if (!isOpen) target.style.display = 'block';
        }
        function toggleHistory() {
            const layout = document.querySelector('.chat-layout');
            layout.classList.toggle('history-collapsed');

            // Salvar no localStorage
            const isCollapsed = layout.classList.contains('history-collapsed');
            localStorage.setItem('chat_history_collapsed', isCollapsed);
        }

        // Estado do histórico: gerenciado no DOMContentLoaded

        function toggleSidebarMobile() {
            document.getElementById('mainSidebar').classList.toggle('active');
        }

        function fazerLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userData');
            localStorage.removeItem('userPlan');
            window.location.href = 'index.html';
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.action-icon') && !e.target.closest('.floating-menu')) {
                document.querySelectorAll('.floating-menu').forEach(m => m.style.display = 'none');
            }
            if (!e.target.closest('.prompts') && !e.target.closest('.floating-panel')) {
                const panel = document.getElementById('promptsPanel');
                if (panel) panel.style.display = 'none';
            }
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage(); // funciona tanto para enviar quanto para PARAR
            }
        });

        /* --- LÓGICA DO MODAL DE PROMPTS (SISTEMA E USUÁRIO) --- */

        function abrirMeusPromptsChat() {
            document.getElementById('attachMenu').style.display = 'none';
            const modal = document.getElementById('modalPromptsChat');
            if (modal) {
                modal.style.display = 'flex';
                switchModalTab('system');
            }
        }

        function fecharModalPromptsChat() {
            document.getElementById('modalPromptsChat').style.display = 'none';
        }

        function switchModalTab(tabName) {
            document.getElementById('tabBtnSystem').classList.remove('active');
            document.getElementById('tabBtnUser').classList.remove('active');

            document.getElementById('tabContentSystem').style.display = 'none';
            document.getElementById('tabContentUser').style.display = 'none';

            if (tabName === 'system') {
                document.getElementById('tabBtnSystem').classList.add('active');
                document.getElementById('tabContentSystem').style.display = 'block';
                loadSystemPrompts();
            } else {
                document.getElementById('tabBtnUser').classList.add('active');
                document.getElementById('tabContentUser').style.display = 'block';
                loadUserPrompts();
            }
        }

        async function loadSystemPrompts() {
            const container = document.getElementById('systemPromptsContainer');
            const loader = document.getElementById('systemPromptsLoader');

            if (cachedSystemPrompts) {
                renderSystemPrompts(cachedSystemPrompts);
                if (loader) loader.style.display = 'none';
                return;
            }

            if (loader) loader.style.display = 'block';

            try {
                const token = localStorage.getItem('token');
                const apiUrl = (typeof CONFIG !== 'undefined' && CONFIG.API_URL) ? CONFIG.API_URL : '';

                const res = await fetch(`${apiUrl}/api/prompts/system`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    cachedSystemPrompts = await res.json();
                    renderSystemPrompts(cachedSystemPrompts);
                } else {
                    container.innerHTML = '<div style="color:#ff6b6b; padding:20px; text-align:center;">Erro ao carregar prompts do sistema.</div>';
                }
            } catch (e) {
                console.error(e);
                container.innerHTML = '<div style="color:#ff6b6b; padding:20px; text-align:center;">Erro de conexão.</div>';
            } finally {
                if (loader) loader.style.display = 'none';
            }
        }

        function renderSystemPrompts(prompts) {
            const container = document.getElementById('systemPromptsContainer');
            container.innerHTML = '';

            if (!prompts || prompts.length === 0) {
                container.innerHTML = '<p style="padding:20px; color:#999;">Nenhum prompt de sistema encontrado.</p>';
                return;
            }

            const groups = {};
            prompts.forEach(p => {
                if (!groups[p.area]) groups[p.area] = [];
                groups[p.area].push(p);
            });

            const sortedAreas = Object.keys(groups).sort();

            const savedCategory = localStorage.getItem('selectedAgentCategory');
            let firstRendered = false;

            let activeItemElement = null;

            for (const area of sortedAreas) {
                const items = groups[area];
                const accItem = document.createElement('div');
                accItem.className = 'accordion-item';

                let isActive = false;
                if (savedCategory) {
                    const catMap = {
                        'tech': ['tecnologia', 'tech'],
                        'juridico': ['jurídico', 'juridico'],
                        'saude': ['saúde', 'saude', 'medicina', 'médico'],
                        'engenharia': ['engenharia'],
                        'negocios': ['negócios', 'negocios'],
                        'operacional': ['operacional'],
                        'criativo': ['criatividade', 'criativo', 'criativos'],
                        'educacao': ['educação', 'estudante', 'educacao'],
                        'meus': ['personalizado']
                    };
                    const possibleMappings = catMap[savedCategory] || [savedCategory];
                    const loweredArea = area.toLowerCase();
                    if (possibleMappings.some(m => loweredArea.includes(m))) {
                        isActive = true;
                    }
                }

                // Se for a primeira aba e não houver um savedCategory que abra nenhuma aba, o fallback será mantê-la fechada (ou pode expandir a primeira)
                // O usuário solicitou abrir a primeira como fallback caso não haja match
                if (!firstRendered && Object.keys(groups).length > 0 && !savedCategory) {
                    isActive = true;
                }

                if (isActive) {
                    accItem.classList.add('active');
                    firstRendered = true; // só o primeiro será o fallback ou o que logrou sucesso
                    activeItemElement = accItem;
                }

                let iconClass = 'fa-layer-group';
                if (area.toLowerCase().includes('juridico')) iconClass = 'fa-scale-balanced';
                if (area.toLowerCase().includes('tech')) iconClass = 'fa-laptop-code';
                if (area.toLowerCase().includes('saude')) iconClass = 'fa-heart-pulse';
                if (area.toLowerCase().includes('negocios')) iconClass = 'fa-briefcase';

                accItem.innerHTML = `
                <div class="accordion-header" onclick="this.parentElement.classList.toggle('active')">
                    <span style="display:flex; align-items:center;">
                        <i class="fas ${iconClass}" style="margin-right:10px; width:20px;"></i> 
                        ${area}
                    </span>
                    <i class="fas fa-chevron-down" style="transition: transform 0.3s;"></i>
                </div>
                <div class="accordion-body"></div>
            `;

                const body = accItem.querySelector('.accordion-body');

                items.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'system-prompt-card sp-has-tooltip';

                    // Correção de Casing para C# API
                    const titulo = p.buttonTitle || p.ButtonTitle || p.profession || p.Profession || 'Sistema';
                    const conteudo = p.content || p.Content || '';
                    const descricao = p.shortDescription || p.ShortDescription || '';

                    card.onclick = () => selecionarPromptChat(encodeURIComponent(titulo), encodeURIComponent(conteudo));

                    card.innerHTML = `
                    <div class="sp-prof">${p.profession || p.Profession || ''}</div>
                    <div class="sp-title">${p.buttonTitle || p.ButtonTitle || ''}</div>
                    ${descricao ? `<div class="sp-tooltip">${descricao}</div>` : ''}
                `;
                    body.appendChild(card);
                });

                container.appendChild(accItem);
            }

            if (activeItemElement) {
                setTimeout(() => {
                    activeItemElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 150);
            }
        }

        async function loadUserPrompts() {
            const container = document.getElementById('listaPromptsChatContent');
            const loader = document.getElementById('userPromptsLoader');

            if (cachedUserPrompts) {
                renderUserPrompts(cachedUserPrompts);
                if (loader) loader.style.display = 'none';
                return;
            }

            if (loader) loader.style.display = 'block';

            try {
                const token = localStorage.getItem('token');
                const apiUrl = (typeof CONFIG !== 'undefined' && CONFIG.API_URL) ? CONFIG.API_URL : '';

                const res = await fetch(`${apiUrl}/api/prompts`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    cachedUserPrompts = await res.json();
                    renderUserPrompts(cachedUserPrompts);
                } else {
                    container.innerHTML = '<div style="color:#ff6b6b; padding:20px; text-align:center;">Erro ao carregar prompts.</div>';
                }
            } catch (e) {
                console.error(e);
                container.innerHTML = '<div style="color:#ff6b6b; padding:20px; text-align:center;">Erro de conexão.</div>';
            } finally {
                if (loader) loader.style.display = 'none';
            }
        }

        function renderUserPrompts(prompts) {
            const container = document.getElementById('listaPromptsChatContent');
            container.innerHTML = '';

            if (!prompts || prompts.length === 0) {
                container.innerHTML = `
                <div style="text-align:center; color:#888; padding:30px;">
                    <i class="fas fa-folder-open" style="font-size:2rem; margin-bottom:10px;"></i><br>
                    Você não tem prompts salvos.<br>
                    <a href="meus_prompts.html" style="color:var(--primary); text-decoration:none; font-size:0.9rem;">Criar prompts</a>
                </div>`;
                return;
            }

            prompts.forEach(p => {
                const item = document.createElement('div');
                item.className = 'prompt-list-item';

                // --- A SOLUÇÃO: À prova de falhas para maiúsculas/minúsculas vindas do C# ---
                const titulo = p.title || p.Title || 'Meu Prompt';
                const conteudo = p.content || p.Content || '...';

                item.onclick = () => selecionarPromptChat(encodeURIComponent(titulo), encodeURIComponent(conteudo));

                item.innerHTML = `
                <strong>${titulo}</strong>
                <p>${conteudo}</p>
            `;
                container.appendChild(item);
            });
        }

        window.addEventListener('click', function (e) {
            const modal = document.getElementById('modalPromptsChat');
            if (e.target == modal) {
                fecharModalPromptsChat();
            }
        });
    </script>
